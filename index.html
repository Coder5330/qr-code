<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>QR Code Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="left">
                <p class="section-label">1. Enter URL</p>
                <input id="data" type="text" placeholder="https://">
                <p class="section-label">2. Choose Style</p>
                <div class="style-menu-bar">
                    <button class="menu-button" onclick="toggleMenu('frame')">Frame</button>
                    <button class="menu-button" onclick="toggleMenu('shape')">Shape</button>
                    <button class="menu-button" onclick="toggleMenu('logo')">Logo</button>
                </div>

                <!-- Frame choices -->
                <div class="style-choices style-frame-choices">
                    <button class="choice-btn" onclick="selectFrame('none')" data-frame="none">
                        <div class="choice-icon">✕</div>
                        <span>None</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('bottom')" data-frame="bottom">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="1" y="1" width="26" height="24" rx="2" fill="white" stroke="#222" stroke-width="1.5"/>
                                <rect x="0" y="25" width="28" height="7" rx="1" fill="#111"/>
                                <text x="14" y="29.5" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Bottom</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('border-bottom')" data-frame="border-bottom">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="1" y="1" width="26" height="24" fill="white" stroke="#111" stroke-width="2.5"/>
                                <rect x="0" y="25" width="28" height="7" fill="#111"/>
                                <text x="14" y="29.5" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Border</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('rounded-bottom')" data-frame="rounded-bottom">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="0" y="0" width="28" height="32" rx="6" fill="#111"/>
                                <rect x="3" y="3" width="22" height="22" rx="2" fill="white"/>
                                <text x="14" y="29" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Rounded</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('top-banner')" data-frame="top-banner">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="1" y="8" width="26" height="23" rx="2" fill="white" stroke="#222" stroke-width="1.5"/>
                                <rect x="0" y="0" width="28" height="8" rx="1" fill="#111"/>
                                <text x="14" y="5.5" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Top Bar</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('circle')" data-frame="circle">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <clipPath id="circ"><circle cx="14" cy="13" r="12"/></clipPath>
                                <rect x="2" y="1" width="24" height="24" fill="#eee" clip-path="url(#circ)"/>
                                <circle cx="14" cy="13" r="12" fill="none" stroke="#222" stroke-width="1.5"/>
                                <text x="14" y="30" text-anchor="middle" fill="#111" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Circle</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('phone')" data-frame="phone">
                        <div class="choice-icon">
                            <svg viewBox="0 0 20 32" width="20" height="32">
                                <rect x="0" y="0" width="20" height="32" rx="4" fill="#111"/>
                                <rect x="2.5" y="5" width="15" height="21" rx="1" fill="white"/>
                                <circle cx="10" cy="2.5" r="1.2" fill="#555"/>
                                <circle cx="10" cy="29.5" r="1.8" fill="#444"/>
                                <text x="10" y="30.8" text-anchor="middle" fill="white" font-size="2.5" font-weight="bold" font-family="sans-serif"></text>
                            </svg>
                        </div>
                        <span>Phone</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('clipboard')" data-frame="clipboard">
                        <div class="choice-icon">
                            <svg viewBox="0 0 26 32" width="26" height="32">
                                <rect x="0" y="5" width="26" height="27" rx="3" fill="white" stroke="#111" stroke-width="2"/>
                                <rect x="8" y="0" width="10" height="8" rx="2" fill="#111"/>
                                <rect x="10" y="1.5" width="6" height="4" rx="1" fill="white"/>
                                <rect x="0" y="25" width="26" height="7" rx="1" fill="#111"/>
                                <text x="13" y="29.5" text-anchor="middle" fill="white" font-size="3.5" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Clipboard</span>
                    </button>
                </div>

                <!-- Shape choices -->
                <div class="style-choices style-shape-choices">
                    <button class="choice-btn" onclick="selectShape('default')" data-shape="default">
                        <div class="choice-icon"><div class="dot-grid default-grid"></div></div>
                        <span>Default</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('rounded')" data-shape="rounded">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28">
                                <rect x="1" y="1" width="17" height="8" rx="4" fill="#111"/>
                                <rect x="21" y="1" width="6" height="8" rx="3" fill="#111"/>
                                <rect x="1" y="11" width="8" height="8" rx="4" fill="#111"/>
                                <rect x="11" y="11" width="16" height="8" rx="4" fill="#111"/>
                                <rect x="1" y="21" width="26" height="6" rx="3" fill="#111"/>
                            </svg>
                        </div>
                        <span>Rounded</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('horizontal')" data-shape="horizontal">
                        <div class="choice-icon"><div class="dot-grid horizontal-grid"></div></div>
                        <span>Bars</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('chamfered')" data-shape="chamfered">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <!-- isolated: all 4 corners cut -->
                                <polygon points="3,1 7,1 9,3 9,7 7,9 3,9 1,7 1,3"/>
                                <!-- right neighbor: TL+BL corners cut, TR+BR joined -->
                                <polygon points="12,1 18,1 18,9 12,9 10,7 10,3"/>
                                <!-- left+right: only TL+BR exposed -->
                                <polygon points="21,1 25,1 27,3 27,9 25,9 21,9 19,7"/>
                                <!-- vertical pair top -->
                                <polygon points="1,12 9,12 9,16 7,18 3,18 1,16"/>
                                <!-- center blob -->
                                <rect x="10" y="12" width="8" height="6" rx="0"/>
                                <polygon points="19,12 27,12 27,18 21,18"/>
                                <!-- vertical pair bottom -->
                                <polygon points="3,20 7,20 9,22 9,26 1,26 1,22"/>
                                <rect x="10" y="20" width="8" height="6"/>
                                <polygon points="21,20 27,20 27,26 25,26 19,24"/>
                            </svg>
                        </div>
                        <span>Chamfer</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('jagged')" data-shape="jagged">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <!-- horizontal arrow run: ◀ middle ▶ -->
                                <polygon points="1,5 9,1 9,9"/>
                                <rect x="9" y="1" width="9" height="8"/>
                                <polygon points="18,1 26,5 18,9"/>
                                <!-- isolated diamond -->
                                <polygon points="4,14 8,10 12,14 8,18"/>
                                <!-- vertical arrow run: spike-up middle spike-down -->
                                <polygon points="19,10 27,10 23,18"/>
                                <polygon points="19,18 27,18 23,26"/>
                            </svg>
                        </div>
                        <span>Jagged</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('wavy')" data-shape="wavy">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <!-- wavy-edged squares using sine-like paths -->
                                <path d="M1,2 Q5,0 9,2 Q9,6 7,9 Q5,10 1,8 Q-1,5 1,2Z"/>
                                <path d="M10,1 Q14,-1 18,1 Q20,4 18,8 Q14,11 10,9 Q8,5 10,1Z"/>
                                <path d="M20,2 Q24,0 27,3 Q28,6 26,9 Q22,11 19,8 Q18,5 20,2Z"/>
                                <path d="M1,11 Q5,9 9,11 Q11,14 9,18 Q5,20 1,17 Q-1,14 1,11Z"/>
                                <path d="M10,10 Q14,8 18,10 Q20,14 18,18 Q14,20 10,17 Q8,14 10,10Z"/>
                                <path d="M20,11 Q24,9 27,12 Q28,16 26,18 Q22,20 19,17 Q18,14 20,11Z"/>
                                <path d="M1,20 Q5,18 9,20 Q11,24 9,27 Q5,29 1,26 Q-1,23 1,20Z"/>
                                <path d="M10,20 Q14,18 18,20 Q20,24 18,27 Q14,29 10,26 Q8,23 10,20Z"/>
                                <path d="M20,20 Q24,18 27,21 Q28,25 26,27 Q22,29 19,26 Q18,23 20,20Z"/>
                            </svg>
                        </div>
                        <span>Wavy</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('arcs')" data-shape="arcs">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <!-- isolated cells: all 4 exposed corners get concave quarter-circle bites -->
                                <path d="M5,1 L9,1 A4,4,0,0,1,9,9 L1,9 A4,4,0,0,1,1,1 Z"/>
                                <!-- horizontal run: middle cell (left+right neighbors dark, top+bottom exposed) -->
                                <path d="M10,1 Q10,5 14,5 Q18,5 18,1 L18,9 Q18,5 14,5 Q10,5 10,9 Z"/>
                                <!-- end of run: right side open, left has neighbor -->
                                <path d="M19,1 L27,1 A4,4,0,0,1,27,9 L19,9 Z"/>
                                <!-- vertical run cells -->
                                <path d="M1,10 L9,10 L9,18 A4,4,0,0,1,1,18 Z"/>
                                <rect x="10" y="10" width="8" height="8"/>
                                <path d="M19,10 A4,4,0,0,1,27,10 L27,18 L19,18 Z"/>
                                <!-- bottom row -->
                                <path d="M1,19 A4,4,0,0,1,9,19 L9,27 L1,27 Z"/>
                                <path d="M10,19 L18,19 L18,27 Q18,23 14,23 Q10,23 10,27 Z"/>
                                <path d="M19,19 L27,19 L27,27 A4,4,0,0,1,19,27 Z"/>
                            </svg>
                        </div>
                        <span>Arcs</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('dot')" data-shape="dot">
                        <div class="choice-icon"><div class="dot-grid dot-grid-cls"></div></div>
                        <span>Dots</span>
                    </button>
                </div>

                <!-- Logo choices -->
                <div class="style-choices style-logo-choices">
                    <button class="choice-btn" onclick="selectLogo('none')" data-logo="none">
                        <div class="choice-icon">✕</div>
                        <span>None</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('heart')" data-logo="heart">
                        <div class="choice-icon">❤️</div>
                        <span>Heart</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('star')" data-logo="star">
                        <div class="choice-icon">⭐</div>
                        <span>Star</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('smile')" data-logo="smile">
                        <div class="choice-icon">😊</div>
                        <span>Smile</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('camera')" data-logo="camera">
                        <div class="choice-icon">📷</div>
                        <span>Camera</span>
                    </button>
                    <button class="choice-btn upload-btn" onclick="document.getElementById('logoUpload').click()">
                        <div class="choice-icon">📁</div>
                        <span>Upload</span>
                        <input type="file" id="logoUpload" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
                    </button>
                </div>
            </div>

            <div class="right">
                <p class="section-label">3. Download</p>
                <canvas id="qr"></canvas>
                <p id="error"></p>
                <button id="download" class="download-button" onclick="downloadQR()">Download</button>
                <button id="copy" class="download-button secondary" onclick="copyQR()">Copy to Clipboard</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
        <script src="script.js?v=15"></script>
    </body>
</html>
