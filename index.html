<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>QR Code Generator</title>
        <link rel="stylesheet" href="style.css?v=10">
    </head>
    <body>
        <div class="container">
            <div class="left">
                <p class="section-label">1. Enter Data</p>
                <div class="input-type-bar">
                    <button class="type-btn active" data-type="url"   onclick="selectInputType('url')">URL</button>
                    <button class="type-btn"         data-type="text"  onclick="selectInputType('text')">Text</button>
                    <button class="type-btn"         data-type="email" onclick="selectInputType('email')">Email</button>
                    <button class="type-btn"         data-type="phone" onclick="selectInputType('phone')">Phone</button>
                    <button class="type-btn"         data-type="wifi"  onclick="selectInputType('wifi')">Wi-Fi</button>
                </div>
                <input id="data" type="text" placeholder="https://" oninput="handleDataInput()">
                <div id="wifi-fields" class="wifi-fields">
                    <input id="wifi-ssid" type="text" placeholder="Network name (SSID)" oninput="drawQR()">
                    <div class="wifi-row">
                        <input id="wifi-pass" type="password" placeholder="Password" oninput="drawQR()">
                        <select id="wifi-sec" onchange="drawQR()">
                            <option value="WPA">WPA/WPA2</option>
                            <option value="WEP">WEP</option>
                            <option value="">None</option>
                        </select>
                    </div>
                </div>
                <p class="section-label">2. Choose Style</p>
                <div class="style-menu-bar">
                    <button class="menu-button" onclick="toggleMenu('frame')">Frame</button>
                    <button class="menu-button" onclick="toggleMenu('shape')">Shape</button>
                    <button class="menu-button" onclick="toggleMenu('logo')">Logo</button>
                </div>

                <!-- Frame choices -->
                <div class="style-choices style-frame-choices">
                    <button class="choice-btn" onclick="selectFrame('none')" data-frame="none">
                        <div class="choice-icon">✕</div>
                        <span>None</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('bottom')" data-frame="bottom">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="1" y="1" width="26" height="24" rx="2" fill="white" stroke="#222" stroke-width="1.5"/>
                                <rect x="0" y="25" width="28" height="7" rx="1" fill="#111"/>
                                <text x="14" y="29.5" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Bottom</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('border-bottom')" data-frame="border-bottom">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="1" y="1" width="26" height="24" fill="white" stroke="#111" stroke-width="2.5"/>
                                <rect x="0" y="25" width="28" height="7" fill="#111"/>
                                <text x="14" y="29.5" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Border</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('rounded-bottom')" data-frame="rounded-bottom">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="0" y="0" width="28" height="32" rx="6" fill="#111"/>
                                <rect x="3" y="3" width="22" height="22" rx="2" fill="white"/>
                                <text x="14" y="29" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Rounded</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('top-banner')" data-frame="top-banner">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <rect x="1" y="8" width="26" height="23" rx="2" fill="white" stroke="#222" stroke-width="1.5"/>
                                <rect x="0" y="0" width="28" height="8" rx="1" fill="#111"/>
                                <text x="14" y="5.5" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Top Bar</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('circle')" data-frame="circle">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 32" width="28" height="32">
                                <clipPath id="circ"><circle cx="14" cy="13" r="12"/></clipPath>
                                <rect x="2" y="1" width="24" height="24" fill="#eee" clip-path="url(#circ)"/>
                                <circle cx="14" cy="13" r="12" fill="none" stroke="#222" stroke-width="1.5"/>
                                <text x="14" y="30" text-anchor="middle" fill="#111" font-size="4" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Circle</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('phone')" data-frame="phone">
                        <div class="choice-icon">
                            <svg viewBox="0 0 20 32" width="20" height="32">
                                <rect x="0" y="0" width="20" height="32" rx="4" fill="#111"/>
                                <rect x="2.5" y="5" width="15" height="21" rx="1" fill="white"/>
                                <circle cx="10" cy="2.5" r="1.2" fill="#555"/>
                                <circle cx="10" cy="29.5" r="1.8" fill="#444"/>
                                <text x="10" y="30.8" text-anchor="middle" fill="white" font-size="2.5" font-weight="bold" font-family="sans-serif"></text>
                            </svg>
                        </div>
                        <span>Phone</span>
                    </button>
                    <button class="choice-btn" onclick="selectFrame('clipboard')" data-frame="clipboard">
                        <div class="choice-icon">
                            <svg viewBox="0 0 26 32" width="26" height="32">
                                <rect x="0" y="5" width="26" height="27" rx="3" fill="white" stroke="#111" stroke-width="2"/>
                                <rect x="8" y="0" width="10" height="8" rx="2" fill="#111"/>
                                <rect x="10" y="1.5" width="6" height="4" rx="1" fill="white"/>
                                <rect x="0" y="25" width="26" height="7" rx="1" fill="#111"/>
                                <text x="13" y="29.5" text-anchor="middle" fill="white" font-size="3.5" font-weight="bold" font-family="sans-serif">SCAN ME</text>
                            </svg>
                        </div>
                        <span>Clipboard</span>
                    </button>
                </div>

                <!-- Shape choices -->
                <div class="style-choices style-shape-choices">
                    <button class="choice-btn" onclick="selectShape('default')" data-shape="default">
                        <div class="choice-icon"><div class="dot-grid default-grid"></div></div>
                        <span>Default</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('rounded')" data-shape="rounded">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28">
                                <rect x="1" y="1" width="17" height="8" rx="4" fill="#111"/>
                                <rect x="21" y="1" width="6" height="8" rx="3" fill="#111"/>
                                <rect x="1" y="11" width="8" height="8" rx="4" fill="#111"/>
                                <rect x="11" y="11" width="16" height="8" rx="4" fill="#111"/>
                                <rect x="1" y="21" width="26" height="6" rx="3" fill="#111"/>
                            </svg>
                        </div>
                        <span>Rounded</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('horizontal')" data-shape="horizontal">
                        <div class="choice-icon"><div class="dot-grid horizontal-grid"></div></div>
                        <span>Bars</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('chamfered')" data-shape="chamfered">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <!-- isolated octagon -->
                                <polygon points="4.5,2 7.5,2 10,4.5 10,7.5 7.5,10 4.5,10 2,7.5 2,4.5"/>
                                <!-- vertical pair: top (TL+TR cut), bottom (BR+BL cut) -->
                                <polygon points="20.5,2 23.5,2 26,4.5 26,10 18,10 18,4.5"/>
                                <polygon points="18,10 26,10 26,15.5 23.5,18 20.5,18 18,15.5"/>
                                <!-- horizontal pair: left (TL+BL cut), right (TR+BR cut) -->
                                <polygon points="4.5,18 10,18 10,26 4.5,26 2,23.5 2,20.5"/>
                                <polygon points="10,18 15.5,18 18,20.5 18,23.5 15.5,26 10,26"/>
                            </svg>
                        </div>
                        <span>Chamfer</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('jagged')" data-shape="jagged">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <!-- horizontal run: left swallowtail, middle, right swallowtail -->
                                <polygon points="0,0 8,0 8,8 0,8 4,4"/>
                                <rect x="8" y="0" width="8" height="8"/>
                                <polygon points="16,0 24,0 20,4 24,8 16,8"/>
                                <!-- isolated plain square -->
                                <rect x="0" y="11" width="7" height="7"/>
                                <!-- vertical run: top swallowtail, bottom swallowtail -->
                                <polygon points="19,10 23,14 27,10 27,18 19,18"/>
                                <polygon points="19,18 27,18 27,26 23,22 19,26"/>
                            </svg>
                        </div>
                        <span>Jagged</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('wavy')" data-shape="wavy">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <path d="M3.9,3.1 C5.2,3.3 10.6,2.8 11.9,2.2 C11.5,3.6 9.4,8.9 8.7,10.2 C7.3,10.8 2,11.3 0.7,11.1 C1.4,9.8 3.5,4.4 3.9,3.1Z"/>
                                <path d="M19.9,0.6 C21.2,1.3 26.6,3.5 27.9,3.9 C27.5,5.3 25.4,10.6 24.7,11.9 C23.3,11.5 18,9.3 16.7,8.6 C17.4,7.2 19.5,1.9 19.9,0.6Z"/>
                                <path d="M8.7,10.2 C10,9.6 15.3,8.5 16.7,8.6 C16.5,9.9 17.5,15.2 18.1,16.6 C16.8,16.5 11.4,17.6 10.1,18.2 C9.5,16.9 8.5,11.6 8.7,10.2Z"/>
                                <path d="M2.1,19.1 C3.4,19.3 8.8,18.8 10.1,18.2 C10.7,19.6 11.4,24.9 11.2,26.2 C9.9,26.8 4.5,27.3 3.2,27.1 C3.4,25.8 2.7,20.4 2.1,19.1Z"/>
                                <path d="M18.1,16.6 C19.4,17.3 24.8,19.5 26.1,19.9 C26.7,21.3 27.4,26.6 27.2,27.9 C25.9,27.5 20.5,25.3 19.2,24.6 C19.4,23.2 18.7,17.9 18.1,16.6Z"/>
                            </svg>
                        </div>
                        <span>Wavy</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('arcs')" data-shape="arcs">
                        <div class="choice-icon">
                            <svg viewBox="0 0 28 28" width="28" height="28" fill="#111">
                                <!-- Row 1: connected run, rounded outer corners -->
                                <path d="M2,0 L9,0 L9,9 L2,9 A2,2,0,0,1,0,7 L0,2 A2,2,0,0,1,2,0Z"/>
                                <rect x="9" y="0" width="9" height="9"/>
                                <path d="M18,0 L25,0 A2,2,0,0,1,27,2 L27,7 A2,2,0,0,1,25,9 L18,9Z"/>
                                <!-- Row 2: curved triangles (3 orientations) -->
                                <path d="M0,10 L9,10 L9,19 Q5,19 0,10Z"/>
                                <path d="M9,10 L9,19 L18,19 Q19,14 9,10Z"/>
                                <path d="M27,19 L18,19 L18,10 Q23,10 27,19Z"/>
                                <!-- Row 3: dian lenses -->
                                <path d="M0,20 Q7,20 8,27 Q1,27 0,20Z"/>
                                <path d="M10,20 Q17,20 18,27 Q11,27 10,20Z"/>
                                <path d="M19,20 Q26,20 27,27 Q20,27 19,20Z"/>
                            </svg>
                        </div>
                        <span>Arcs</span>
                    </button>
                    <button class="choice-btn" onclick="selectShape('dot')" data-shape="dot">
                        <div class="choice-icon"><div class="dot-grid dot-grid-cls"></div></div>
                        <span>Dots</span>
                    </button>
                </div>

                <!-- Logo choices -->
                <div class="style-choices style-logo-choices">
                    <button class="choice-btn" onclick="selectLogo('none')" data-logo="none">
                        <div class="choice-icon">✕</div>
                        <span>None</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('heart')" data-logo="heart">
                        <div class="choice-icon">❤️</div>
                        <span>Heart</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('star')" data-logo="star">
                        <div class="choice-icon">⭐</div>
                        <span>Star</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('smile')" data-logo="smile">
                        <div class="choice-icon">😊</div>
                        <span>Smile</span>
                    </button>
                    <button class="choice-btn" onclick="selectLogo('camera')" data-logo="camera">
                        <div class="choice-icon">📷</div>
                        <span>Camera</span>
                    </button>
                    <button class="choice-btn upload-btn" onclick="document.getElementById('logoUpload').click()">
                        <div class="choice-icon">📁</div>
                        <span>Upload</span>
                        <input type="file" id="logoUpload" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
                    </button>
                </div>
                <p class="section-label">3. Colors</p>
                <div class="color-row">
                    <label class="color-label">
                        QR
                        <input type="color" id="fgColorPicker" value="#111111" oninput="setFgColor(this.value)">
                    </label>
                    <label class="color-label">
                        Background
                        <input type="color" id="bgColorPicker" value="#ffffff" oninput="setBgColor(this.value)">
                    </label>
                </div>
            </div>

            <div class="right">
                <p class="section-label">4. Download</p>
                <canvas id="qr"></canvas>
                <p id="error"></p>
                <div class="size-bar">
                    <span class="size-bar-label">Size</span>
                    <div class="size-btns">
                        <button class="size-btn"        data-size="512"  onclick="selectDownloadSize(512)">512</button>
                        <button class="size-btn active" data-size="1024" onclick="selectDownloadSize(1024)">1024</button>
                        <button class="size-btn"        data-size="2048" onclick="selectDownloadSize(2048)">2048</button>
                    </div>
                </div>
                <button id="download" class="download-button" onclick="downloadQR()">Download</button>
                <button id="copy" class="download-button secondary" onclick="copyQR()">Copy to Clipboard</button>
            </div>
        </div>
        <div id="toast" class="toast">Copied to clipboard</div>

        <!-- Wavy scan warning modal -->
        <div id="wavy-modal" class="modal-overlay" style="display:none">
            <div class="modal-box">
                <div class="modal-icon">⚠️</div>
                <h3 class="modal-title">Scanning Warning</h3>
                <p class="modal-body">The <strong>Wavy</strong> style may fail to scan on older Android phones or low-end QR readers. For best compatibility, use a simpler style.</p>
                <label class="modal-check">
                    <input type="checkbox" id="wavy-no-show"><span>Don't show this again</span>
                </label>
                <button class="modal-btn" onclick="closeWavyModal()">Got it</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
        <script src="script.js?v=29"></script>
    </body>
</html>
